<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanda Acevedo</title>
    <link rel="stylesheet" href="style.css?v=1.4">
</head>
<body>

    <div class="interface-container">
        
        <!-- COLUMNA IZQUIERDA: MENÚ FIJO CON BLOQUES -->
        <aside class="sidebar">
            <div class="brand" onclick="irAHome()">
                <h2>Wanda Acevedo</h2>
            </div>
            
            <nav class="menu-group">
                <a href="#" onclick="mostrarInfo()" class="menu-root-box">■ Biografía <span class="en-menu">| Biography</span></a>
            </nav>

            <nav class="menu-group">
                <span class="menu-root-box">■ Trabajo <span class="en-menu">| Work</span></span>
                <div class="tree-branch-box">
                    <a href="#" onclick="filtrarCategoria('comercial')">▪ Marcas <span class="en-menu">/ Brands</span></a>
                    <a href="#" onclick="filtrarCategoria('freelance')">▪ Freelance <span class="en-menu">Freelance</span></a>
                </div>
            </nav>

            <nav class="menu-group">
                <span class="menu-root-box">■ Proyectos <span class="en-menu">| Proyectos</span></span>
                <div class="tree-branch-box">
                    <a href="#" onclick="filtrarCategoria('audiovisual')">▪ Audiovisual <span class="en-menu">| Audiovisual</span></a>
                    <a href="#" onclick="filtrarCategoria('instalaciones')">▪ Instalaciones <span class="en-menu">| Art Installations</span></a>
                    <a href="#" onclick="filtrarCategoria('diseno')">▪ Diseño Gráfico <span class="en-menu">| Graphic Design</span></a>
                    <a href="#" onclick="filtrarCategoria('fotografia')">▪ Fotografía <span class="en-menu">| Photography</span></a>
                </div>
            </nav>
        </aside>

        <!-- COLUMNA DERECHA: CONTENIDO DINÁMICO -->
        <main class="content-area">
            
            <!-- FILTROS EXCLUSIVOS PARA TRABAJOS COMERCIALES -->
            <section id="filtros-comerciales" class="hidden">
                <div class="grupo-filtro">
                    <span class="filtro-label">Filtros / Filters:</span>
                    <button onclick="filtrarCategoria('comercial')">Todos / All</button>
                    <button onclick="filtrarPorMetadato('Short Form')">Short Form</button>
                    <button onclick="filtrarPorMetadato('Motion Graphics')">Motion Graphics</button>
                    <button onclick="filtrarPorMetadato('UX/UI')">UX/UI</button>
                    <button onclick="filtrarPorMetadato('Branding')">Branding</button>
                    <button onclick="filtrarPorMetadato('Color Grading')">Color Grading</button>
                    <button onclick="filtrarPorMetadato('AI Tools')">AI Tools</button>
                </div>
            </section>

            <!-- BOTÓN VOLVER ATRÁS -->
            <div id="back-button-container" class="hidden">
                <button class="back-button" onclick="volverALaGrilla()">← volver / back</button>
            </div>

            <!-- CONTENEDOR PRINCIPAL -->
            <div id="dynamic-content"></div>
            
        </main>

    </div>

    <script src="projects.js"></script>

<div id="lightbox-modal" class="lightbox-hidden" onclick="cerrarImagen()">
    <span class="lightbox-cerrar">&times;</span>
    <img id="lightbox-img" src="" alt="Imagen ampliada">
</div>
    
</body>
</html>
